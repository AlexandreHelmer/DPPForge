{% extends "account/base.html" %}
{% load i18n %}

{% block head_title %}Connexion Réussie{% endblock %}

{% block content %}
<div class="text-center">
    <div class="alert alert-success" role="alert">
        <h4 class="alert-heading">✓ Connexion réussie !</h4>
        <p class="mb-0">Vous êtes maintenant authentifié.</p>
    </div>

    <div class="mt-4">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Chargement...</span>
        </div>
        <p class="text-muted mt-3">Finalisation de la connexion...</p>
    </div>
</div>
{% endblock %}

{% block extra_body %}
<script>
    console.log('Fetching social token...');
    // Fetch the token from the social-token endpoint
    fetch('/api/accounts/social-token/')
        .then(response => {
            if (!response.ok) throw new Error('Token fetch failed');
            return response.json();
        })
        .then(data => {
            console.log('Token received:', data.token ? 'Yes' : 'No');
            if (data.token) {
                // Store in localStorage (shared with parent window)
                localStorage.setItem('authToken', data.token);
                if (data.user) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                }

                // Notify parent
                if (window.opener) {
                    window.opener.postMessage({ type: 'oauth_success', token: data.token }, '*');
                }
            }

            // Close after a short delay
            setTimeout(() => {
                if (window.opener) {
                    console.log('Closing popup...');
                    window.close();
                } else {
                    window.location.href = '/dashboard';
                }
            }, 500);
        })
        .catch(err => {
            console.error('Failed to fetch social token:', err);
            // Fallback: just close or redirect
            setTimeout(() => {
                if (window.opener) window.close();
                else window.location.href = '/login';
            }, 3000);
        });
</script>
{% endblock %}
