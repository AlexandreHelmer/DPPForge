{% extends "account/base.html" %}
{% load i18n %}

{% block head_title %}Login Callback{% endblock %}

{% block content %}
<div class="text-center">
    <div class="alert alert-success" role="alert">
        <h4 class="alert-heading">✓ Connexion réussie !</h4>
        <p class="mb-0">Vous êtes maintenant connecté.</p>
    </div>

    <div class="mt-4">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Chargement...</span>
        </div>
        <p class="text-muted mt-3">Redirection en cours...</p>
    </div>
</div>
{% endblock %}

{% block extra_body %}
<script>
    // Close popup if cancelled
    if (window.opener) {
        window.opener.postMessage({ type: 'oauth_cancelled' }, '*');
        setTimeout(() => {
            window.close();
        }, 1000);
    } else {
        window.location.href = '/login';
    }
</script>
{% endblock %}
